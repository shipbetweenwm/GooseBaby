name: goose_baby
description: 鹅宝 - AI 驱动的桌面智能宠物伙伴
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # 桌面窗口控制
  window_manager: ^0.4.0
  system_tray: ^2.0.3
  hotkey_manager: ^0.2.3
  screen_retriever: ^0.2.0

  # 网络 / AI
  dio: ^5.4.0
  crypto: ^3.0.3

  # 数据存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # 状态管理
  provider: ^6.1.1

  # 视频动画（media_kit 支持 Windows 桌面端）
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # 文件选择
  file_picker: ^8.0.0

  # URL 打开
  url_launcher: ^6.2.5

  # 工具
  uuid: ^3.0.7
  intl: ^0.19.0
  collection: ^1.18.0
  path: ^1.9.0
  mime: ^1.0.5
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/sounds/
    - assets/shaders/
